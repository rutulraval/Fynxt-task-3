name: API Automation CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Run API tests
        run: mvn -Dcucumber.filter.tags="@api and not @mock" clean test

      - name: Run Mock API tests
        run: mvn -Denv=mock -Dtest=RunnerTest -Dcucumber.filter.tags="@mock" test

      - name: Generate Cucumber HTML report
        if: always()
        run: mvn verify -DskipTests

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: test-output/

  ui-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Run UI tests in headless mode
        run: mvn -Dcucumber.filter.tags="@ui" -Dbrowser=chromeHeadless clean test
        continue-on-error: true

      - name: Generate Cucumber HTML report
        if: always()
        run: mvn verify -DskipTests

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-cucumber-report
          path: test-output/

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: Screenshots/

