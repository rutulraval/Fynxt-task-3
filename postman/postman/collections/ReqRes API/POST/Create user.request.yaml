$kind: http-request
url: "{{baseUrl}}/api/users"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: '{"name": "{{dynamicName}}", "job": "{{dynamicJob}}"}'
scripts:
  - type: beforeRequest
    code: |-
      pm.variables.set("dynamicName", pm.variables.replaceIn("{{$randomFullName}}"));
      pm.variables.set("dynamicJob", pm.variables.replaceIn("{{$randomJobTitle}}"));
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test("Status code is 201", () => pm.response.to.have.status(201));
      pm.test("Content-Type is JSON", () => pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json"));
      pm.test("Response has id", () => {
          const json = pm.response.json();
          pm.expect(json).to.have.property('id');
          pm.expect(json).to.have.property('name');
          pm.expect(json).to.have.property('job');
          pm.environment.set('userId', json.id);
      });
    language: text/javascript
order: 1000
