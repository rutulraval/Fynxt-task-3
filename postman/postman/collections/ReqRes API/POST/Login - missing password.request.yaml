$kind: http-request
url: "{{baseUrl}}/api/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: '{"email": "eve.holt@reqres.in"}'
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 400", () => pm.response.to.have.status(400));
      pm.test("Response time < 2000ms", () => pm.expect(pm.response.responseTime).to.be.below(2000));
      pm.test("Content-Type is JSON", () => pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json"));
      pm.test("Response has error message", () => {
          const json = pm.response.json();
          pm.expect(json.error).to.equal('Missing password');
      });
    language: text/javascript
order: 3000
