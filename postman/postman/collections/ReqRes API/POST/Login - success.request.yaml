$kind: http-request
url: "{{baseUrl}}/api/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: '{"email": "eve.holt@reqres.in", "password": "cityslicka"}'
scripts:
  - type: beforeRequest
    code: pm.variables.set("requestStartedAt", Date.now());
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", () => pm.response.to.have.status(200));
      pm.test("Response time < 2000ms", () => pm.expect(pm.response.responseTime).to.be.below(2000));
      pm.test("Content-Type is JSON", () => pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json"));
      pm.test("Response has token", () => {
          const json = pm.response.json();
          pm.expect(json).to.have.property('token');
          pm.environment.set('apiKey', json.token);
      });
      pm.test("Measured duration from request timestamp is non-negative", () => {
          const startedAt = Number(pm.variables.get("requestStartedAt") || 0);
          pm.expect(Date.now() - startedAt).to.be.at.least(0);
      });
    language: text/javascript
order: 2000
