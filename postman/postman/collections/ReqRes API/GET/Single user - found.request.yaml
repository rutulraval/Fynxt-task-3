$kind: http-request
url: "{{baseUrl}}/api/users/3"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", () => pm.response.to.have.status(200));
      pm.test("Response time < 2000ms", () => pm.expect(pm.response.responseTime).to.be.below(2000));
      pm.test("Content-Type is JSON", () => pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json"));
      pm.test("Response has user data", () => {
          const json = pm.response.json();
          pm.expect(json.data).to.have.property('id', 3);
          pm.expect(json.data).to.have.all.keys('id', 'email', 'first_name', 'last_name', 'avatar');
      });
    language: text/javascript
order: 3000
