$kind: http-request
url: "{{baseUrl}}/api/users/55"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 404", () => pm.response.to.have.status(404));
      pm.test("Response time < 2000ms", () => pm.expect(pm.response.responseTime).to.be.below(2000));
      pm.test("404 payload is empty JSON object or empty body", () => {
          const body = pm.response.text().trim();
          pm.expect(body === "" || body === "{}").to.equal(true);
      });
    language: text/javascript
order: 4000
