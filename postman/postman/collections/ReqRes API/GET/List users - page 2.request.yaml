$kind: http-request
url: "{{baseUrl}}/api/users?page=2"
method: GET
queryParams:
  page: "2"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", () => pm.response.to.have.status(200));
      pm.test("Response time < 2000ms", () => pm.expect(pm.response.responseTime).to.be.below(2000));
      pm.test("Content-Type is JSON", () => pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json"));
      pm.test("Page is 2 with user list", () => {
          const json = pm.response.json();
          pm.expect(json.page).to.equal(2);
          pm.expect(json.data).to.be.an('array');
      });
    language: text/javascript
order: 2000
